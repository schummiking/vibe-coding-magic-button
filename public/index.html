<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vibe Coding Magic Button</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #1a1a2e; color: #eee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #status { font-size: 13px; color: #666; margin-bottom: 24px; }
  #status.ok { color: #4ade80; }
  #status.err { color: #f87171; }

  .buttons { display: flex; flex-direction: column; align-items: center; gap: 24px; }

  #talk-btn {
    width: 180px; height: 180px; border-radius: 50%;
    border: 3px solid #333;
    background: radial-gradient(circle at 30% 30%, #2d2d5e, #16213e);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #666; cursor: pointer;
    transition: all 0.15s; touch-action: manipulation;
  }
  #talk-btn.active {
    background: radial-gradient(circle at 30% 30%, #dc2626, #991b1b);
    border-color: #ef4444; color: #fff;
    transform: scale(0.96);
    box-shadow: 0 0 30px rgba(239,68,68,0.35);
  }
  #talk-btn.off { opacity: 0.25; pointer-events: none; }

  #enter-btn {
    width: 160px; height: 48px; border-radius: 12px;
    border: 2px solid #333;
    background: linear-gradient(135deg, #1e3a5f, #16213e);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #666; cursor: pointer;
    transition: all 0.12s; touch-action: manipulation;
    letter-spacing: 1px;
  }
  #enter-btn:active {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-color: #3b82f6; color: #fff;
    transform: scale(0.95);
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
  }
  #enter-btn.off { opacity: 0.25; pointer-events: none; }

  #hint { margin-top: 20px; font-size: 11px; color: #444; text-align: center; }

  #mic-toggle {
    position: fixed; top: 16px; right: 16px;
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #333; background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
    transition: all 0.2s;
  }
  #mic-toggle.on { border-color: #4ade80; background: #1a3a2e; }
</style>
</head>
<body>
<div id="mic-toggle">🎙️</div>
<div id="status">Loading...</div>
<div class="buttons">
  <div id="talk-btn" class="off">Tap to Talk</div>
  <div id="enter-btn" class="off">⏎ Submit</div>
</div>
<div id="hint">Tap 🎙️ to enable microphone</div>
<script>
const $ = id => document.getElementById(id);
let mic = null, recording = false, connected = false;
let audioCtx = null, sourceNode = null, processorNode = null;
let sendQueue = Promise.resolve();
let micActive = false;

async function checkServer() {
  try {
    const r = await fetch('/ping');
    if (r.ok) {
      connected = true;
      $('status').textContent = 'Connected ✓';
      $('status').className = 'ok';
      $('enter-btn').classList.remove('off');
      if (micActive) $('talk-btn').classList.remove('off');
      return;
    }
  } catch {}
  connected = false;
  $('status').textContent = 'Connection failed';
  $('status').className = 'err';
  setTimeout(checkServer, 3000);
}

async function activateMic() {
  try {
    mic = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    sourceNode = audioCtx.createMediaStreamSource(mic);
    processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
    processorNode.onaudioprocess = (e) => {
      if (!recording) return;
      sendPCM(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    sourceNode.connect(processorNode);
    processorNode.connect(audioCtx.destination);
    micActive = true;
    $('mic-toggle').classList.add('on');
    $('hint').textContent = 'Microphone active';
    if (connected) $('talk-btn').classList.remove('off');
  } catch(e) {
    $('hint').textContent = 'Microphone permission denied';
  }
}

function deactivateMic() {
  if (recording) {
    recording = false;
    $('talk-btn').classList.remove('active');
    $('talk-btn').textContent = 'Tap to Talk';
    fetch('/key/stop', { method: 'POST' }).catch(() => {});
  }
  if (processorNode) { processorNode.disconnect(); processorNode = null; }
  if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (mic) { mic.getTracks().forEach(t => t.stop()); mic = null; }
  micActive = false;
  $('mic-toggle').classList.remove('on');
  $('talk-btn').classList.add('off');
  $('hint').textContent = 'Tap 🎙️ to enable microphone';
}

$('mic-toggle').addEventListener('click', async () => {
  if (micActive) deactivateMic();
  else await activateMic();
});

function sendPCM(float32Array) {
  const int16 = new Int16Array(float32Array.length);
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  const blob = new Blob([int16.buffer], { type: 'application/octet-stream' });
  sendQueue = sendQueue.then(() =>
    fetch('/audio', { method: 'POST', body: blob }).catch(() => {})
  );
}

// Talk button
$('talk-btn').addEventListener('click', async () => {
  if (!connected || !micActive) return;
  if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();

  if (!recording) {
    recording = true;
    $('talk-btn').classList.add('active');
    $('talk-btn').textContent = '🎤 Listening...';
    $('hint').textContent = 'Tap again to stop';
    await fetch('/key/start', { method: 'POST' });
  } else {
    recording = false;
    $('talk-btn').classList.remove('active');
    $('talk-btn').textContent = 'Tap to Talk';
    $('hint').textContent = 'Tap to start voice input';
    await sendQueue;
    await fetch('/key/stop', { method: 'POST' });
  }
});

// Enter/Submit button
$('enter-btn').addEventListener('click', async () => {
  if (!connected) return;
  $('enter-btn').style.background = 'linear-gradient(135deg, #2563eb, #1d4ed8)';
  $('enter-btn').style.color = '#fff';
  await fetch('/key/enter', { method: 'POST' });
  setTimeout(() => {
    $('enter-btn').style.background = '';
    $('enter-btn').style.color = '';
  }, 200);
});

(async () => { await checkServer(); })();
</script>
</body>
</html>
